version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recruit-db
    environment:
      POSTGRES_USER: recruit
      POSTGRES_PASSWORD: recruit123
      POSTGRES_DB: recruitment
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruit -d recruitment"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recruit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruit-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruit-celery
    command: celery -A app.tasks.celery_tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
      - ./data:/data

volumes:
  pg_data:
